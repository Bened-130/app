<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Voting</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Pusher JS SDK -->
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.2/dist/axios.min.js"></script>
    <style>
        .error-box { background: #fee; color: #c33; padding: 15px; border-radius: 8px; margin: 10px 0; }
        .success-box { background: #efe; color: #3c3; padding: 15px; border-radius: 8px; margin: 10px 0; }
        .debug-info { background: #f0f0f0; padding: 10px; font-family: monospace; font-size: 11px; margin-top: 20px; text-align: left; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗳️ Cast Your Vote</h1>
        <p class="subtitle">Click a button to vote. Results update live for everyone!</p>
        
        <div id="voting-list" class="voting-list">
            <div class="loading">Loading candidates...</div>
        </div>
        
        <div class="status">
            <span id="connection-status" class="status-indicator connecting">Initializing...</span>
        </div>
        
        <div id="debug-panel" class="debug-info">
            <strong>Debug Log:</strong>
            <div id="debug-content"></div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION - UPDATE THESE 3 VALUES
        // ============================================
        
        // 1. PUSHER KEY: From https://dashboard.pusher.com/apps/[YOUR_APP_ID]/keys
        const PUSHER_KEY = 'b3376f4c3b42063fadcf';        // ← REPLACE (e.g., 'a1b2c3d4e5f6...')
        
        // 2. PUSHER CLUSTER: Same page as above (eu, us2, mt1, ap1, etc.)
        const PUSHER_CLUSTER = 'ap2';    // ← REPLACE (e.g., 'eu')
        
        // 3. API BASE URL: Your Flask server address
        // If using Live Server (port 5500): 'http://localhost:5000'
        // If accessing Flask directly: '' (empty for same origin)
        const API_BASE_URL = 'http://localhost:5000';  // ← REPLACE IF NEEDED
        
        // ============================================
        // CODE - NO CHANGES NEEDED BELOW
        // ============================================
        
        const getApiUrl = (endpoint) => API_BASE_URL ? `${API_BASE_URL}${endpoint}` : endpoint;
        
        let pusher = null;
        let channel = null;
        let candidates = [];
        
        function debug(msg) {
            console.log(msg);
            const div = document.getElementById('debug-content');
            if (div) div.innerHTML += `<div>${new Date().toLocaleTimeString()}: ${msg}</div>`;
        }
        
        function initPusher() {
            if (PUSHER_KEY === 'YOUR_APP_KEY') {
                showError('Update PUSHER_KEY in HTML file (line 48)');
                return false;
            }
            
            try {
                pusher = new Pusher(PUSHER_KEY, { cluster: PUSHER_CLUSTER, encrypted: true });
                channel = pusher.subscribe('poll');
                
                pusher.connection.bind('connected', () => {
                    debug('Pusher connected');
                    updateStatus('connected', 'Connected to realtime');
                });
                
                pusher.connection.bind('error', (err) => {
                    debug(' Pusher error: ' + JSON.stringify(err));
                });
                
                channel.bind('vote', function(data) {
                    debug(' Received live update');
                    if (data && Array.isArray(data)) {
                        candidates = data;
                        renderVotingList(data);
                        updateStatus('live', '● Live updates active');
                    }
                });
                
                channel.bind('pusher:subscription_succeeded', () => debug('✅ Subscribed to channel'));
                
                return true;
            } catch (e) {
                debug('Pusher init failed: ' + e.message);
                return false;
            }
        }
        
        async function loadCandidates() {
            updateStatus('connecting', 'Loading candidates...');
            
            try {
                const url = getApiUrl('/api/names');
                debug('Fetching: ' + url);
                
                const response = await axios.get(url, { timeout: 10000 });
                debug('Loaded ' + response.data.length + ' candidates');
                
                candidates = response.data;
                renderVotingList(candidates);
                updateStatus('ready', 'Click to vote');
                return true;
            } catch (error) {
                let msg = 'Failed to load candidates. ';
                if (error.response && error.response.status === 404) {
                    msg += '<br><strong>API not found. Check API_BASE_URL setting.</strong><br>';
                    msg += 'Current: <code>' + getApiUrl('/api/names') + '</code><br>';
                    msg += 'Is Flask running on port 5000?';
                } else if (error.code === 'ECONNREFUSED' || error.message.includes('Network')) {
                    msg += '<br><strong>Cannot connect to server.</strong><br>';
                    msg += 'Run: <code>python app.py</code>';
                } else {
                    msg += error.message;
                }
                
                debug('API Error: ' + error.message);
                showError(msg);
                updateStatus('error', 'Load failed');
                return false;
            }
        }
        
        function renderVotingList(votes) {
            const container = document.getElementById('voting-list');
            if (!votes || votes.length === 0) {
                container.innerHTML = '<div class="error-box">No candidates found</div>';
                return;
            }
            
            const totalVotes = votes.reduce((sum, item) => sum + (item.votes || 0), 0);
            const maxVotes = Math.max(...votes.map(v => v.votes || 0), 1);
            
            let html = '';
            votes.forEach(item => {
                const count = item.votes || 0;
                const pct = totalVotes > 0 ? ((count / totalVotes) * 100).toFixed(1) : 0;
                const bar = maxVotes > 0 ? ((count / maxVotes) * 100) : 0;
                
                html += `
                    <div class="vote-item">
                        <div class="vote-info">
                            <span class="name">${escapeHtml(item.name)}</span>
                            <span class="count">${count} votes (${pct}%)</span>
                        </div>
                        <div class="bar-container">
                            <div class="bar" style="width: ${bar}%"></div>
                        </div>
                        <button class="vote-btn" onclick="submitVote('${escapeHtml(item.name)}', this)">
                            Vote for ${escapeHtml(item.name)}
                        </button>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        async function submitVote(name, btn) {
            btn.disabled = true;
            btn.textContent = 'Voting...';
            
            try {
                const url = getApiUrl('/vote');
                debug('Voting for: ' + name);
                
                const response = await axios.post(url, { name: name }, {
                    headers: { 'Content-Type': 'application/json' },
                    timeout: 10000
                });
                
                debug('Vote successful');
                btn.textContent = '✓ Voted!';
                btn.style.background = '#48bb78';
                
                if (response.data && response.data.data) {
                    renderVotingList(response.data.data);
                }
                
                setTimeout(() => {
                    btn.textContent = 'Vote for ' + name;
                    btn.style.background = '';
                    btn.disabled = false;
                }, 2000);
                
            } catch (error) {
                debug('Vote failed: ' + error.message);
                btn.textContent = 'Failed - Retry';
                btn.style.background = '#f56565';
                btn.disabled = false;
                alert('Vote failed: ' + (error.response?.data?.error || error.message));
            }
        }
        
        function updateStatus(type, msg) {
            const el = document.getElementById('connection-status');
            el.className = 'status-indicator ' + type;
            el.textContent = msg;
        }
        
        function showError(msg) {
            document.getElementById('voting-list').innerHTML = `<div class="error-box">${msg}</div>`;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            initPusher();
            loadCandidates();
        });
    </script>
</body>
</html>
