<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Voting</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Pusher JS SDK -->
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.2/dist/axios.min.js"></script>
    <style>
        /* Emergency inline styles in case CSS fails to load */
        .error-box { background: #fee; color: #c33; padding: 15px; border-radius: 8px; margin: 10px 0; }
        .success-box { background: #efe; color: #3c3; padding: 15px; border-radius: 8px; margin: 10px 0; }
        .debug-info { background: #f0f0f0; padding: 10px; font-family: monospace; font-size: 12px; margin-top: 20px; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗳️ Cast Your Vote</h1>
        <p class="subtitle">Click a button to vote. Results update live for everyone!</p>
        
        <div id="voting-list" class="voting-list">
            <div class="loading">Loading candidates...</div>
        </div>
        
        <div class="status">
            <span id="connection-status" class="status-indicator connecting">Initializing...</span>
        </div>
        
        <!-- Debug panel - remove in production -->
        <div id="debug-panel" class="debug-info" style="display:none;">
            <strong>Debug Info:</strong>
            <div id="debug-content"></div>
        </div>
    </div>

    <script>
        // ============================================
        // STEP 1: UPDATE THESE WITH YOUR PUSHER CREDENTIALS
        // Get these from: https://dashboard.pusher.com/apps/2133420/b33704c3b42063fadcf/keys
        // ============================================
        const PUSHER_KEY = 'b3376f4c3b42063fadcf';        
        const PUSHER_CLUSTER = 'ap2';    
        
        // ============================================
        // STEP 2: UPDATE THIS WITH YOUR FLASK SERVER URL
        // ============================================
        // If running locally: 'http://localhost:5000' or 'http://127.0.0.1:5000'
        // If deployed: 'https://your-app.herokuapp.com' or your domain
        const API_BASE_URL = '';  // ← LEAVE EMPTY to use same origin, or set explicitly like 'http://localhost:5000'
        
        // Build full API URL
        const getApiUrl = (endpoint) => {
            if (API_BASE_URL) {
                return `${API_BASE_URL}${endpoint}`;
            }
            // Same origin - works if HTML is served by Flask
            return endpoint;
        };
        
        // Global state
        let pusher = null;
        let channel = null;
        let candidates = [];
        let isPusherConnected = false;
        let isDataLoaded = false;
        
        // Debug logging
        function debug(msg) {
            console.log(msg);
            const debugDiv = document.getElementById('debug-content');
            if (debugDiv) {
                debugDiv.innerHTML += `<div>${new Date().toLocaleTimeString()}: ${msg}</div>`;
            }
        }
        
        // ============================================
        // INITIALIZE PUSHER
        // ============================================
        function initPusher() {
            debug('Initializing Pusher...');
            
            if (PUSHER_KEY === 'YOUR_APP_KEY') {
                showError('⚠️ Configuration Error: Please update PUSHER_KEY in the HTML file');
                return false;
            }
            
            try {
                pusher = new Pusher(PUSHER_KEY, {
                    cluster: PUSHER_CLUSTER,
                    encrypted: true,
                    forceTLS: true,
                    timeout: 5000
                });
                
                channel = pusher.subscribe('poll');
                
                // Connection events
                pusher.connection.bind('connected', () => {
                    debug('✅ Pusher connected');
                    isPusherConnected = true;
                    updateStatus('connected', 'Connected to realtime');
                });
                
                pusher.connection.bind('disconnected', () => {
                    debug('❌ Pusher disconnected');
                    isPusherConnected = false;
                    updateStatus('disconnected', 'Disconnected');
                });
                
                pusher.connection.bind('error', (err) => {
                    debug('Pusher error: ' + JSON.stringify(err));
                    updateStatus('error', 'Connection error');
                });
                
                // CRITICAL: Listen for vote events
                channel.bind('vote', function(data) {
                    debug('📥 Received vote event with ' + (data ? data.length : 0) + ' candidates');
                    if (data && Array.isArray(data)) {
                        candidates = data;
                        renderVotingList(data);
                        updateStatus('live', '● Live updates active');
                    }
                });
                
                // Subscription events
                channel.bind('pusher:subscription_succeeded', () => {
                    debug('✅ Subscribed to channel');
                });
                
                channel.bind('pusher:subscription_error', (status) => {
                    debug('❌ Subscription error: ' + status);
                });
                
                return true;
            } catch (e) {
                debug('❌ Pusher init failed: ' + e.message);
                return false;
            }
        }
        
        // ============================================
        // LOAD CANDIDATES FROM API
        // ============================================
        async function loadCandidates() {
            debug('Loading candidates from API...');
            updateStatus('connecting', 'Loading candidates...');
            
            try {
                const url = getApiUrl('/api/names');
                debug('Fetching from: ' + url);
                
                const response = await axios.get(url, { timeout: 10000 });
                debug('API response: ' + JSON.stringify(response.data));
                
                if (response.data && Array.isArray(response.data)) {
                    candidates = response.data;
                    isDataLoaded = true;
                    renderVotingList(candidates);
                    updateStatus('connected', 'Ready - click to vote');
                    return true;
                } else {
                    throw new Error('Invalid data format from API');
                }
            } catch (error) {
                debug('❌ API Error: ' + error.message);
                if (error.response) {
                    debug('Status: ' + error.response.status);
                }
                
                // Show detailed error
                let errorMsg = 'Failed to load candidates. ';
                if (error.code === 'ECONNREFUSED' || error.message.includes('Network Error')) {
                    errorMsg += '<br><strong>Is the Flask server running on port 5000?</strong><br>';
                    errorMsg += 'Run: <code>python app.py</code>';
                } else if (error.response && error.response.status === 404) {
                    errorMsg += 'API endpoint not found. Check server configuration.';
                } else {
                    errorMsg += error.message;
                }
                
                showError(errorMsg);
                updateStatus('error', 'Load failed');
                return false;
            }
        }
        
        // ============================================
        // RENDER VOTING LIST
        // ============================================
        function renderVotingList(votes) {
            const container = document.getElementById('voting-list');
            
            if (!votes || votes.length === 0) {
                container.innerHTML = '<div class="error-box">No candidates available</div>';
                return;
            }
            
            // Calculate statistics
            const totalVotes = votes.reduce((sum, item) => sum + (item.votes || 0), 0);
            const maxVotes = Math.max(...votes.map(v => v.votes || 0), 1);
            
            let html = '';
            votes.forEach(item => {
                const voteCount = item.votes || 0;
                const percentage = totalVotes > 0 ? ((voteCount / totalVotes) * 100).toFixed(1) : 0;
                const barWidth = maxVotes > 0 ? ((voteCount / maxVotes) * 100) : 0;
                
                html += `
                    <div class="vote-item" data-name="${escapeHtml(item.name)}">
                        <div class="vote-info">
                            <span class="name">${escapeHtml(item.name)}</span>
                            <span class="count">${voteCount} votes (${percentage}%)</span>
                        </div>
                        <div class="bar-container">
                            <div class="bar" style="width: ${barWidth}%"></div>
                        </div>
                        <button class="vote-btn" onclick="submitVote('${escapeHtml(item.name)}', this)">
                            Vote for ${escapeHtml(item.name)}
                        </button>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            debug('Rendered ' + votes.length + ' candidates');
        }
        
        // ============================================
        // SUBMIT VOTE
        // ============================================
        async function submitVote(candidateName, btnElement) {
            debug('Submitting vote for: ' + candidateName);
            
            // Disable button immediately
            btnElement.disabled = true;
            btnElement.textContent = 'Voting...';
            
            try {
                const url = getApiUrl('/vote');
                debug('Posting to: ' + url);
                
                const response = await axios.post(url, {
                    name: candidateName
                }, {
                    headers: { 'Content-Type': 'application/json' },
                    timeout: 10000
                });
                
                debug('Vote successful: ' + JSON.stringify(response.data));
                
                // Show success
                btnElement.textContent = '✓ Voted!';
                btnElement.style.background = '#48bb78';
                
                // Update display immediately with returned data
                if (response.data && response.data.data) {
                    renderVotingList(response.data.data);
                }
                
                // Reset button after 2 seconds
                setTimeout(() => {
                    btnElement.textContent = 'Vote for ' + candidateName;
                    btnElement.style.background = '';
                    btnElement.disabled = false;
                }, 2000);
                
            } catch (error) {
                debug('❌ Vote failed: ' + error.message);
                
                btnElement.textContent = 'Failed - Retry';
                btnElement.style.background = '#f56565';
                btnElement.disabled = false;
                
                // Show error alert
                let msg = 'Vote failed';
                if (error.response) {
                    msg += ': ' + (error.response.data.error || error.response.statusText);
                }
                alert(msg);
            }
        }
        
        // ============================================
        // UI HELPERS
        // ============================================
        function updateStatus(type, message) {
            const indicator = document.getElementById('connection-status');
            indicator.className = 'status-indicator ' + type;
            indicator.textContent = message;
        }
        
        function showError(message) {
            const container = document.getElementById('voting-list');
            container.innerHTML = `<div class="error-box">${message}</div>`;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ============================================
        // STARTUP
        // ============================================
        document.addEventListener('DOMContentLoaded', async () => {
            // Show debug panel (remove this line in production)
            document.getElementById('debug-panel').style.display = 'block';
            
            debug('Page loaded. API_BASE_URL: ' + (API_BASE_URL || '(same origin)'));
            
            // Initialize Pusher first
            initPusher();
            
            // Then load data
            await loadCandidates();
        });
    </script>
</body>
</html>
