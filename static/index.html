<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Voting</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Pusher JS SDK -->
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <!-- Axios for HTTP requests -->
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.2/dist/axios.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>🗳️ Cast Your Vote</h1>
        <p class="subtitle">Click a button to vote. Results update live for everyone!</p>
        
        <div id="voting-list" class="voting-list">
            <!-- Vote items injected here -->
        </div>
        
        <div class="status">
            <span id="connection-status" class="status-indicator connecting">Connecting...</span>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION - AUTO-LOADED FROM SERVER
        // ============================================
        let PUSHER_KEY = 'YOUR_APP_KEY';
        let PUSHER_CLUSTER = 'YOUR_CLUSTER';
        
        // Fetch config from server (optional, falls back to hardcoded)
        async function loadConfig() {
            try {
                const response = await axios.get('/api/config');
                PUSHER_KEY = response.data.key;
                PUSHER_CLUSTER = response.data.cluster;
            } catch (e) {
                console.log('Using fallback config');
            }
        }
        
        // Initialize Pusher
        let pusher, channel;
        
        function initPusher() {
            pusher = new Pusher(PUSHER_KEY, {
                cluster: PUSHER_CLUSTER,
                encrypted: true
            });
            
            channel = pusher.subscribe('poll');
            
            // Listen for real-time updates
            channel.bind('vote', function(data) {
                renderVotingList(data);
                updateConnectionStatus('live');
            });
            
            // Connection status handlers
            pusher.connection.bind('connected', () => {
                updateConnectionStatus('connected');
            });
            
            pusher.connection.bind('disconnected', () => {
                updateConnectionStatus('disconnected');
            });
        }
        
        // Track total votes for percentage calculation
        let totalVotes = 0;
        
        // Fetch initial data and render
        async function loadInitialData() {
            try {
                const response = await axios.get('/api/names');
                renderVotingList(response.data);
                updateConnectionStatus('connected');
            } catch (error) {
                console.error('Failed to load initial data:', error);
                updateConnectionStatus('error');
            }
        }
        
        // Render the voting list with live bars
        function renderVotingList(votes) {
            const container = document.getElementById('voting-list');
            container.innerHTML = '';
            
            // Calculate total for percentage bars
            totalVotes = votes.reduce((sum, item) => sum + item.votes, 0);
            const maxVotes = Math.max(...votes.map(v => v.votes), 1);
            
            votes.forEach(item => {
                const percentage = totalVotes > 0 ? (item.votes / totalVotes * 100).toFixed(1) : 0;
                const barWidth = maxVotes > 0 ? (item.votes / maxVotes * 100) : 0;
                
                const voteItem = document.createElement('div');
                voteItem.className = 'vote-item';
                voteItem.innerHTML = `
                    <div class="vote-info">
                        <span class="name">${escapeHtml(item.name)}</span>
                        <span class="count">${item.votes} votes (${percentage}%)</span>
                    </div>
                    <div class="bar-container">
                        <div class="bar" style="width: ${barWidth}%"></div>
                    </div>
                    <button class="vote-btn" onclick="submitVote('${escapeHtml(item.name)}')">
                        Vote
                    </button>
                `;
                container.appendChild(voteItem);
            });
        }
        
        // Submit vote
        async function submitVote(name) {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = 'Voting...';
            
            try {
                await axios.post('/vote', { name: name });
                btn.textContent = 'Voted!';
                setTimeout(() => {
                    btn.textContent = 'Vote';
                    btn.disabled = false;
                }, 1000);
            } catch (error) {
                console.error('Vote failed:', error);
                btn.textContent = 'Failed - Retry';
                btn.disabled = false;
            }
        }
        
        function updateConnectionStatus(status) {
            const indicator = document.getElementById('connection-status');
            indicator.className = 'status-indicator ' + status;
            
            const labels = {
                'connecting': 'Connecting...',
                'connected': 'Connected',
                'live': '● Live Updates',
                'disconnected': 'Disconnected',
                'error': 'Error'
            };
            indicator.textContent = labels[status] || status;
        }
        
        // Utility: Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Initialize
        async function init() {
            await loadConfig();
            initPusher();
            await loadInitialData();
        }
        
        init();
    </script>
</body>
</html>
